name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version=8.4 --distribution-type=bin
        chmod +x gradlew

    - name: Generate Keystore
      run: |
        keytool -genkey -v \
          -keystore app/keystore.jks -alias chinacnu \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass chinacnu2024 -keypass chinacnu2024 \
          -dname "CN=ChinaCNU,O=ChinaCNU,C=CN"

    - name: Build Release APK
      env:
        KEYSTORE_PATH: keystore.jks
        KEYSTORE_PASSWORD: chinacnu2024
        KEY_ALIAS: chinacnu
        KEY_PASSWORD: chinacnu2024
        BUILD_NUMBER: ${{ github.run_number }}
      run: ./gradlew assembleRelease

    - name: Rename APK with version
      run: |
        mv app/build/outputs/apk/release/app-release.apk \
           "app/build/outputs/apk/release/WA-Translator-v1.0.${{ github.run_number }}.apk"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: WA-Translator-v1.0.${{ github.run_number }}
        path: app/build/outputs/apk/release/WA-Translator-v1.0.${{ github.run_number }}.apk
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "WA翻译助手 v1.0.${{ github.run_number }}"
        body: |
          ## ChinaCNU WA翻译助手 v1.0.${{ github.run_number }}

          **下载地址：https://wa.cnuday.com/WA-Translator.apk**

          ### 本版更新
          - 界面贴近原生WhatsApp手机版
          - 收到消息自动翻译显示在气泡下方
          - 输入中文自动出现翻译预览发送条
          - APK文件名带版本号，方便识别
        files: app/build/outputs/apk/release/WA-Translator-v1.0.${{ github.run_number }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
