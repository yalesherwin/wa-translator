name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version=8.4 --distribution-type=bin
        chmod +x gradlew

    - name: Generate Keystore
      run: |
        keytool -genkey -v \
          -keystore app/keystore.jks \
          -alias chinacnu \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass chinacnu2024 \
          -keypass chinacnu2024 \
          -dname "CN=ChinaCNU, OU=App, O=ChinaCNU, L=China, S=China, C=CN"

    - name: Build Release APK
      env:
        KEYSTORE_PATH: keystore.jks
        KEYSTORE_PASSWORD: chinacnu2024
        KEY_ALIAS: chinacnu
        KEY_PASSWORD: chinacnu2024
      run: ./gradlew assembleRelease --stacktrace

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WA翻译助手-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WA翻译助手-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "WA翻译助手 v1.0.${{ github.run_number }}"
        body: |
          ## ChinaCNU WhatsApp 翻译助手

          **下载 app-release.apk 安装到手机即可使用**

          ### 功能
          - 登录自己的WhatsApp账号（扫二维码）
          - 收到外文消息自动翻译成中文
          - 支持18种语言互译
          - 中文输入自动翻译成英文发送
          - 完全免费，无需注册
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
